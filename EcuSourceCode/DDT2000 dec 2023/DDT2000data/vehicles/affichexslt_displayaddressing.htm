'-----------------------------------------------------------------
Sub ReadStyle(fileName)
set oXsl = CreateObject("MSXML2.FreeThreadedDOMDocument")
oXsl.Async = false
if oXsl.load(fileName) then
	set xslt = CreateObject("MSXML2.XSLTemplate")
	on error resume next
	Set xslt.stylesheet = oXsl
	if err then
		preview.innertext = "Error init XSLTemplate"
		styleerr.innerHTML = "XSLTemplate error<br><P>Reason = <B>" & err.description & "</B></P><P>source = <B>" & err.source & "</B></P>"

		'styleerr.innerHTML = "XSLTemplate error<br><P>Reason = <B>" & xslt.parseError.reason & "</B></P><P>Line = <B>" & xslt.parseError.line & "</B></P><P>LinePos = <B>" & xslt.parseError.linepos & "</B></P>"
		err.clear
		on error goto 0
		err.raise "Error reading style (template)",1,"Pas bon"
	else
		styleerr.innerHTML = "Read style OK"
		'textxml.innerText = oXsl.xml
	end if
	on error goto 0
else
	styleerr.innerHTML = "<P>Reason = <B>" & oXsl.parseError.reason & "</B></P><P>Line = <B>" & oXsl.parseError.line & "</B></P><P>LinePos = <B>" & oXsl.parseError.linepos & "</B></P>"
	on error goto 0
	err.raise "Error reading style (load)",1,"Pas bon"
end if
End Sub

Sub DDTFileSelect_Clear()

set odoc = nothing
Preview.innerText = ""
dfilename.innerText = ""
End Sub


'----------------------------------------------------------
' ---- Ecrire le dernier chemin dans le base de registre
Sub writePathToReg(pathName)
dim WshShell
On Error Resume Next
err.clear
Set WshShell = CreateObject("WScript.Shell")
If Err Then
	 Err.Clear
	 Exit Sub
End If

WshShell.RegWrite C_REGKEY, pathName
err.clear
End Sub

'-------------------------------------------------
' ---- Ecrire le dernier chemin dans le base de registre
Function readPathFromReg(defaultValue)
dim WshShell
On Error Resume Next
readPathFromReg = defaultValue
err.clear
Set WshShell = CreateObject("WScript.Shell")
If Err Then
	 Err.Clear
	 Exit Function
End If
readPathFromReg= WshShell.RegRead(C_REGKEY)
if err then
	readPathFromReg = defaultValue
end if
err.clear
End Function
