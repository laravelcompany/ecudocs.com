<script language=vbscript>

Option Explicit

Function public_put_ConfigurationACC(data)
ConfigurationAccAffiche.innertext = data.text
select case data.value
case 0
	ConfigurationAccAffiche.style.backgroundcolor="red"
	ConfigurationAccAffiche.style.color="white"	
case 1
	ConfigurationAccAffiche.style.backgroundcolor="mediumseagreen"
	ConfigurationAccAffiche.style.color="white"
end select
End Function

Function public_put_ConfigurationLV(data)
ConfigurationLvAffiche.innertext = data.Text
select case data.value
case 0
	ConfigurationLvAffiche.style.backgroundcolor="red"
	ConfigurationLvAffiche.style.color="white"
case 1
	ConfigurationLvAffiche.style.backgroundcolor="mediumseagreen"
	ConfigurationLvAffiche.style.color="white"
end select
End Function

</script>
