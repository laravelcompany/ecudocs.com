<script language=vbscript>
Option Explicit
Const msgNodispo = "Non présente"

function borne(Value,min,max)
if value < min then
	borne=min
elseif value > max then
	borne=max
else
	borne=value
end if
end function

Function public_put_AffPlusAPC(data)
dim v
if data is nothing then
	DataPlusAPCNom.innertext = ""
	DataPlusAPCText.innertext = ""
else
	DataPlusAPCNom.innertext = data.name
	on error resume next
	v = data.value
	if err then
		DataPlusAPCText.innertext = msgNodispo
		err.clear
	else
		on error goto 0
		DataPlusAPCText.innertext = data.text
		select case v
			case 0
				DataPlusAPCText.style.backgroundcolor="red"
				DataPlusAPCText.style.color="white"	
			case 1
				DataPlusAPCText.style.backgroundcolor="mediumseagreen"
				DataPlusAPCText.style.color="white"
		end select
	end if
End If
End Function

Function public_put_AffAntidemarrage(data)
dim v
if data is nothing then
	DataAntidemarrageNom.innertext = ""
	DataAntidemarrageText.innertext = ""
else

	DataAntidemarrageNom.innertext = data.name
	on error resume next
	v = data.value
	if err then
		DataAntidemarrageText.innertext = msgNodispo
		err.clear
	else
		on error goto 0
		DataAntidemarrageText.innertext = data.text
		select case data.value
		case 0
			DataAntidemarrageText.style.backgroundcolor="mediumseagreen"
			DataAntidemarrageText.style.color="white"
		case 1
			DataAntidemarrageText.style.backgroundcolor="red"
			DataAntidemarrageText.style.color="white"	
		end select
	end if
end if
End Function

Function public_put_AffTensionBatterie(data)
dim v
if data is nothing then
else
	on error resume next
	v = data.value
	if err then
		err.clear
	else
		on error goto 0
		If data.value > 11 and data.value < 15 then
			BatteryName.style.backgroundcolor="mediumseagreen"
		else
			BatteryName.style.backgroundcolor="red"
		end if
		VoltPointer.style.rotation = (borne(data.value,6,16)-11)*26.7
		VoltDigit.innerText = formatnumber(data.value,2)
	end if
end if

End Function

Function public_put_AffTemperatureEau(data)
dim v
if data is nothing then
else
	on error resume next
	v = data.value
	if err then
		err.clear
		else
		on error goto 0
		If data.value > 1 and data.value < 110 then
			WaterName.style.backgroundcolor="mediumseagreen"
		else
			WaterName.style.backgroundcolor="red"
		end if
		WaterPointer.style.rotation = (borne(data.value,40,120)-80)*3.33
		WaterDigit.innerText = formatnumber(data.value,2)
	end if
end if
	WaterPointer.style.rotation = (borne(data.value,40,120)-80)*3.33
	WaterDigit.innerText = data.text
End Function

Function public_put_AffTemperatureAir(data)
dim v
if data is nothing then
else
	on error resume next
	v = data.value
	if err then
		err.clear
		else
		on error goto 0
			If data.value > -20 and data.value < 60 then
			AirName.style.backgroundcolor="mediumseagreen"
		else
			AirName.style.backgroundcolor="red"
		end if
		AirPointer.style.rotation = (borne(data.value,20,40)-10)*4.5
		AirDigit.innerText = formatnumber(data.value,2)

	end if
end if
	AirPointer.style.rotation = (borne(data.value,-20,40)-10) * 4.5
	AirDigit.innerText = data.text
End Function

Function public_put_AffRegimeMoteur(data)

if data is nothing then

	DataRegimeMoteurText.innertext = msgNodispo
		err.clear

	DataRegimeMoteurText.innertext = data.text

select case data.value

case 1
	DataRegimeMoteurText.style.backgroundcolor="mediumseagreen"

	end select
		end if
	end if
End Function
