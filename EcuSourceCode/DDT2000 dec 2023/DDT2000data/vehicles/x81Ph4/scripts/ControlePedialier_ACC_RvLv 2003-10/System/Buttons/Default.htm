<script language=vbscript>
Option Explicit

Dim ButtonWithFocus

Sub public_Display(ButtonName)
select case ButtonName
case "StartButton"
	StartButton.style.display=""
case "StepButton"
	StepButton.style.display=""
case "AutoButton"
	AutoButton.style.display=""
case "CancelButton"
	CancelButton.style.display=""
case "TicketButton"
	TicketButton.style.display=""
case "ExitButton"
	ExitButton.style.display=""
end select
End Sub

Sub public_HideAll
StartButton.style.display="none"
StepButton.style.display="none"
AutoButton.style.display="none"
TicketButton.style.display="none"
ExitButton.style.display="none"	
CancelButton.style.display="none"
End Sub

Sub public_Hide(ButtonName)
select case ButtonName
case "StartButton"
	StartButton.style.display="none"
case "StepButton"
	StepButton.style.display="none"
case "AutoButton"
	AutoButton.style.display="none"
case "CancelButton"
	CancelButton.style.display="none"
case "TicketButton"
	TicketButton.style.display="none"
case "ExitButton"
	ExitButton.style.display="none"
end select
End Sub

Function public_get_ButtonClicked()
public_get_ButtonClicked=ButtonWithFocus
End function

Sub public_put_StartButtonLabel(Text)
StartButtonLabel.innertext=Text
End Sub

Sub StartButton_OnClick
ButtonWithFocus="Start"
window.external.bubbleEvent
End Sub

Sub AutoButton_OnClick
ButtonWithFocus="Auto"
window.external.bubbleEvent
End Sub

Sub StepButton_OnClick
ButtonWithFocus="Step"
window.external.bubbleEvent
End Sub

Sub CancelButton_OnClick
ButtonWithFocus="Cancel"
window.external.bubbleEvent
End Sub

Sub TicketButton_OnClick
ButtonWithFocus="Ticket"
window.external.bubbleEvent
End Sub

Sub ExitButton_OnClick
ButtonWithFocus="Exit"
window.external.bubbleEvent
End Sub





Sub Window_OnLoad()
End Sub
</script>

<title>Buttons</title>

</head>
