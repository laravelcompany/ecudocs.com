<script language=vbscript>
Option Explicit

Function public_put_ValueForGraph(Data)
if Data.value < 0 then
	GraphRight.style.display = "none"
	GraphLeft.style.display = ""
	if Data.value < -6 then
		GraphLeft.width = cint(-Data.value/6) & "%"
	else
		GraphLeft.width = "1%"
	end if
end if
if Data.value >= 0 then
	GraphRight.style.display = ""
	GraphLeft.style.display = "none"
	if Data.value > 6 then
		GraphRight.width = cint(Data.value/6) & "%"
	else
		GraphRight.width = "1%"
	end if
end if
End Function

Function public_put_ValueForText(Data)
GraphRight.innertext = cint(Data.text) & "%"
End Function

Sub public_ClearGraph()
Graph.innertext = ""
Graph.width = "1%"
End Sub

Sub Window_OnLoad()
End Sub
</script>
