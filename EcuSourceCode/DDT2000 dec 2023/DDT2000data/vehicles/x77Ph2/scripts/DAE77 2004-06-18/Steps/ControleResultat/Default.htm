Option Explicit


Sub public_ClearAll()
Ball.style.left = 0*9+142

ValeurMaxDroite.style.backgroundcolor="white"
ValeurMaxDroite.style.color="black"
ValeurMaxDroite.innertext = ""
ValeurMaxGauche.style.backgroundcolor="white"
ValeurMaxGauche.style.color="black"
ValeurMaxGauche.innertext = ""
ValeurEcart.style.backgroundcolor="#DFDCD7" 
ValeurEcart.style.color="black"
ValeurEcart.innertext = ""
End Sub

Function public_put_ValueForMaxGauche(data)
ValeurMaxGauche.innertext = formatnumber(data,1) & " °"
if data >= 0 then
	ValeurMaxGauche.style.backgroundcolor="red"
	ValeurMaxGauche.style.color="white"
end if
End Function

Function public_put_ValueForMaxDroite(data)
ValeurMaxDroite.innertext = formatnumber(data,1) & " °"
if data <= 0 then
	ValeurMaxDroite.style.backgroundcolor="red"
	ValeurMaxdroite.style.color="white"
end if
End Function

Function public_put_ValueForDelta(EcartValue)
Dim RealValue
RealValue=EcartValue
If EcartValue <-25 then EcartValue=-25
If EcartValue >25 then EcartValue=25
Ball.style.left = EcartValue*9+142
ValeurEcart.innertext = formatnumber(RealValue,1)
if (EcartValue >= 15) or (EcartValue < -15) then
	ValeurEcart.style.backgroundcolor="red"
	ValeurEcart.style.color="white"
end if
End function

Sub Window_OnLoad()
End Sub
</script>
