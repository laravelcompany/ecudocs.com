<script language=vbscript>

Option Explicit

Function public_put_AffLecturePresenceBadge(data)
if data is nothing then
DataPresenceNom.innertext = ""
DataPresenceText.innertext = ""
else
DataPresenceNom.innertext = data.name
DataPresenceText.innertext = data.text
select case data.value
case 0
	DataPresenceText.style.backgroundcolor="red"
	DataPresenceText.style.color="white"
case 1
	DataPresenceText.style.backgroundcolor="mediumseagreen"
	DataPresenceText.style.color="white"
end select
end if
End Function

Function public_put_AffStatusVirginite(data)
if data is nothing then
	DataStatusVirginiteNom.innertext = ""
	DataStatusVirginiteText.innertext = ""
else
	DataStatusVirginiteNom.innertext = data.name
	DataStatusVirginiteText.innertext = data.text
	select case data.value
	case 0
		DataStatusVirginiteText.style.backgroundcolor="red"
		DataStatusVirginiteText.style.color="white"
	case 1
		DataStatusVirginiteText.style.backgroundcolor="mediumseagreen"
		DataStatusVirginiteText.style.color="white"
	end select
end if
End Function

Function public_put_AffNbBadgesAppris(data)
if data is nothing then
DataNbBadgesApprisNom.innertext = ""
DataNbBadgesApprisText.innertext = ""
else
DataNbBadgesApprisNom.innertext = data.name
DataNbBadgesApprisText.innertext = data.value
select case data.value
case 0
	DataNbBadgesApprisText.style.backgroundcolor="mediumseagreen"
	DataNbBadgesApprisText.style.color="white"
case 1
	DataNbBadgesApprisText.style.backgroundcolor="mediumseagreen"
	DataNbBadgesApprisText.style.color="white"
case 2
	DataNbBadgesApprisText.style.backgroundcolor="mediumseagreen"
	DataNbBadgesApprisText.style.color="white"
case 3
	DataNbBadgesApprisText.style.backgroundcolor="mediumseagreen"
	DataNbBadgesApprisText.style.color="white"
case 4
	DataNbBadgesApprisText.style.backgroundcolor="mediumseagreen"
	DataNbBadgesApprisText.style.color="white"

end select
end if
End Function

End Sub
